services:
  postgres:
    image: postgres:16
    container_name: symbio-postgres
    environment:
      POSTGRES_USER: symbio
      POSTGRES_PASSWORD: symbio
      POSTGRES_DB: symbio
    ports:
      - "5435:5432"
    volumes:
      - symbio_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: symbio-redis
    ports:
      - "6379:6379"
    volumes:
      - symbio_redis:/data

  meilisearch:
    image: getmeili/meilisearch:v1.3.3
    container_name: symbio-meili
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - symbio_meili:/meili_data

  minio:
    image: minio/minio:latest
    container_name: symbio-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - symbio_minio:/data

  minio-init:
    image: minio/mc:latest
    container_name: symbio-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...waiting for minio' && sleep 1; done;
      /usr/bin/mc mb -p local/symbio || true;
      /usr/bin/mc anonymous set download local/symbio || true;
      echo 'minio bucket symbio ready';
      "
    restart: "no"

volumes:
  symbio_pgdata:
  symbio_redis:
  symbio_meili:
  symbio_minio:
